# frozen_string_literal: true

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 20) %>
  # Connection pool tuning for performance lab (default 5 is too low for benchmarks)
  checkout_timeout: 5
  reaping_frequency: 10

development:
  <<: *default
  database: rails_performance_lab_development
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>

test:
  <<: *default
  database: rails_performance_lab_test
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>

production:
  <<: *default
  database: rails_performance_lab_production
  url: <%= ENV["DATABASE_URL"] %>
